name: Update My TRMNL
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to click "Run workflow" manually
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: allows the bot to save display.png
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow beautifulsoup4 cloudscraper
          
      run: python update_image.py
        env:
          TRMNL_API_KEY: ${{ secrets.TRMNL_API_KEY }}
          
      - name: Save Image to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git pull origin main --rebase # Merges any changes you made online first
          git add display.png
          git commit -m "Update Fortnite Image" || exit 0
          git push origin main
